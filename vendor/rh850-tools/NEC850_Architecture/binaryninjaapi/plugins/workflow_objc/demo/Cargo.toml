[package]
name = "workflow_objc-static"
version = "0.1.0"
edition = "2021"
license = "BSD-3-Clause"

[lib]
crate-type = ["staticlib"]
path = "../src/lib.rs"

[features]
demo = []

[dependencies]
binaryninja = { workspace = true, features = ["demo"] }
binaryninjacore-sys.workspace = true
dashmap = { version = "6.1", features = ["rayon"]}
once_cell = "1.20"
thiserror = "2.0"
bstr = "1.12"
tracing = "0.1"