[package]
name = "dwarf_import-static"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
crate-type = ["staticlib"]
path = "../src/lib.rs"

[features]
demo = []

[dependencies]
dwarfreader = { path = "../../shared/" }
binaryninja = { workspace = true, features = ["demo"]}
binaryninjacore-sys.workspace = true
gimli = "0.31"
iset = "0.2.2"
cpp_demangle = "0.4.3"
regex = "1"
indexmap = "2.5.0"
object = "0.36"
tracing = "0.1"