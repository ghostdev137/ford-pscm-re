[package]
name = "arch_riscv"
version = "0.1.0"
authors = ["Ryan Snyder <ryan.snyder.or@gmail.com>"]
edition = "2021"
license = "Apache-2.0"
publish = false

[dependencies]
binaryninja.workspace = true
binaryninjacore-sys.workspace = true
riscv-dis = { path = "disasm" }
rayon = { version = "1.0", optional = true }
tracing = "0.1"

[features]
default = []
liftcheck = ["rayon", "binaryninja/rayon"]

[lib]
crate-type = ["cdylib"]